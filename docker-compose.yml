services:
  # 主应用服务
  markdown-resume:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: markdown-resume-app
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - NUXT_PUBLIC_SITE_URL=${PUBLIC_URL:-http://localhost:${WEB_PORT:-3000}}
      - NUXT_APP_BASE_URL=/
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # SiliconFlow runtime config (server key and public helpers)
      - SILICON_FLOW_API_KEY=${SILICON_FLOW_API_KEY:-}
      - SILICON_FLOW_BASE_URL=${SILICON_FLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      - SILICON_FLOW_MODEL=${SILICON_FLOW_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      # (Optional) expose also as public for back-compat if some client code checks it
      - NUXT_PUBLIC_SILICON_FLOW_BASE_URL=${SILICON_FLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      - NUXT_PUBLIC_SILICON_FLOW_MODEL=${SILICON_FLOW_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      - NUXT_PUBLIC_GOOGLE_FONTS_KEY=${NUXT_PUBLIC_GOOGLE_FONTS_KEY:-}
    restart: unless-stopped
    networks:
      - resume-network

networks:
  resume-network:
    driver: bridge
