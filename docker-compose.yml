services:
  # 主应用服务
  markdown-resume:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: markdown-resume-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - NUXT_PUBLIC_SITE_URL=http://localhost:3000
      - NUXT_APP_BASE_URL=/
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NUXT_PUBLIC_GOOGLE_FONTS_KEY=${NUXT_PUBLIC_GOOGLE_FONTS_KEY:-}
    restart: unless-stopped
    networks:
      - resume-network

networks:
  resume-network:
    driver: bridge
